name: Checkov Scan

on: [push, pull_request]

jobs:
  checkov-job:
    runs-on: ubuntu-latest
    name: checkov-scan
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: terraform